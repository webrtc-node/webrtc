name: Setup native build
description: Install native build dependencies for the WebRTC Node addon.

inputs:
  windows-vcpkg-triplet:
    description: Optional vcpkg target triplet. Defaults to the native static Windows triplet.

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if sudo apt-get update && sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libssl-dev \
            ninja-build \
            python3; then
            exit 0
          fi
          sleep $((attempt * 10))
        done
        exit 1

    - name: Install macOS OpenSSL
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew install openssl@3
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

    - name: Configure Windows vcpkg
      if: runner.os == 'Windows'
      id: windows-vcpkg
      shell: pwsh
      env:
        WINDOWS_VCPKG_TRIPLET: ${{ inputs.windows-vcpkg-triplet }}
      run: |
        $triplet = $env:WINDOWS_VCPKG_TRIPLET
        if (-not $triplet) {
          $triplet = if ($env:RUNNER_ARCH -eq "ARM64") {
            "arm64-windows-static"
          } else {
            "x64-windows-static"
          }
        }

        $manifest = Get-Content (Join-Path $env:GITHUB_WORKSPACE "vcpkg.json") | ConvertFrom-Json
        $baseline = $manifest.'builtin-baseline'
        if ($baseline -notmatch '^[0-9a-f]{40}$') {
          throw "vcpkg.json must contain a 40-character builtin-baseline"
        }

        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkgRoot -or -not (Test-Path (Join-Path $vcpkgRoot ".git"))) {
          $vcpkgRoot = "C:\vcpkg"
        }
        if (-not (Test-Path (Join-Path $vcpkgRoot ".git"))) {
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git $vcpkgRoot
        }

        git -C $vcpkgRoot fetch origin $baseline --depth=1
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to fetch vcpkg baseline $baseline"
        }
        git -C $vcpkgRoot checkout --force $baseline
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to check out vcpkg baseline $baseline"
        }

        & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to bootstrap vcpkg"
        }

        $installedDir = Join-Path $env:GITHUB_WORKSPACE "vcpkg_installed"
        $toolchainFile = Join-Path $vcpkgRoot "scripts\buildsystems\vcpkg.cmake"

        "triplet=$triplet" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
        "VCPKG_TARGET_TRIPLET=$triplet" | Out-File -FilePath $env:GITHUB_ENV -Append
        "VCPKG_INSTALLED_DIR=$installedDir" | Out-File -FilePath $env:GITHUB_ENV -Append
        "CMAKE_TOOLCHAIN_FILE=$toolchainFile" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Cache Windows vcpkg packages
      if: runner.os == 'Windows'
      uses: actions/cache@v5
      with:
        path: vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.windows-vcpkg.outputs.triplet }}-${{ hashFiles('vcpkg.json') }}

    - name: Install Windows native dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") install `
          --triplet $env:VCPKG_TARGET_TRIPLET `
          --x-manifest-root=$env:GITHUB_WORKSPACE `
          --x-install-root=$env:VCPKG_INSTALLED_DIR
        if ($LASTEXITCODE -ne 0) {
          throw "vcpkg dependency installation failed"
        }

        $opensslBin = Join-Path $env:VCPKG_INSTALLED_DIR "$env:VCPKG_TARGET_TRIPLET\tools\openssl"
        if (-not (Test-Path (Join-Path $opensslBin "openssl.exe"))) {
          throw "vcpkg OpenSSL executable was not found at $opensslBin"
        }
        $opensslBin | Out-File -FilePath $env:GITHUB_PATH -Append
        & (Join-Path $opensslBin "openssl.exe") version
