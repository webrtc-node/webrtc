name: Published Install

on:
  workflow_dispatch:
    inputs:
      package_spec:
        description: npm package spec to install (tag or exact version)
        required: true
        default: "@webrtc-node/webrtc@latest"
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  package:
    name: Resolve package
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      spec: ${{ steps.resolve.outputs.spec }}
      media_spec: ${{ steps.resolve.outputs.media_spec }}
      stats_spec: ${{ steps.resolve.outputs.stats_spec }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - id: resolve
        name: Resolve npm package spec
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE_SPEC: ${{ inputs.package_spec }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            spec="$INPUT_PACKAGE_SPEC"
          else
            spec="$(node -p "const p = require('./packages/webrtc/package.json'); p.name + '@' + p.version")"
          fi

          version=""
          for attempt in 1 2 3 4 5 6; do
            if version="$(npm view "$spec" version)"; then
              break
            fi
            if [ "$attempt" = "6" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

          media_spec="@webrtc-node/media@$version"
          stats_spec="@webrtc-node/stats@$version"
          for companion in "$media_spec" "$stats_spec"; do
            for attempt in 1 2 3 4 5 6; do
              if npm view "$companion" version; then break; fi
              if [ "$attempt" = "6" ]; then exit 1; fi
              sleep $((attempt * 10))
            done
          done

          echo "spec=$spec" >> "$GITHUB_OUTPUT"
          echo "media_spec=$media_spec" >> "$GITHUB_OUTPUT"
          echo "stats_spec=$stats_spec" >> "$GITHUB_OUTPUT"
          echo "Testing $spec, $media_spec, and $stats_spec" >> "$GITHUB_STEP_SUMMARY"

  linux:
    name: ${{ matrix.target }}
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-glibc
            image: node:24-bookworm
          - target: linux-x64-musl
            image: node:24-alpine

    steps:
      - name: Install published package
        env:
          PACKAGE_SPEC: ${{ needs.package.outputs.spec }}
          MEDIA_SPEC: ${{ needs.package.outputs.media_spec }}
          STATS_SPEC: ${{ needs.package.outputs.stats_spec }}
        run: |
          docker run --rm \
            -e PACKAGE_SPEC \
            -e MEDIA_SPEC \
            -e STATS_SPEC \
            -e WEBRTC_NODE_PREBUILD_ONLY=1 \
            "${{ matrix.image }}" \
            sh -lc 'set -eu
              workdir="$(mktemp -d)"
              cd "$workdir"
              npm init -y >/dev/null
              for attempt in 1 2 3; do
                if npm install "$PACKAGE_SPEC" "$MEDIA_SPEC" "$STATS_SPEC"; then
                  break
                fi
                if [ "$attempt" = "3" ]; then
                  exit 1
                fi
                sleep $((attempt * 10))
              done
              node -e "const { RTCPeerConnection } = require(\"@webrtc-node/webrtc\"); const pc = new RTCPeerConnection(); pc.close(); console.log(\"cjs ok\");"
              node -e "const { RTCPeerConnection } = require(\"@webrtc-node/webrtc\"); const { EncodedMediaSource } = require(\"@webrtc-node/media\"); const { RTCStatsSampler } = require(\"@webrtc-node/stats\"); (async () => { const pc = new RTCPeerConnection(); const source = new EncodedMediaSource({ kind: \"video\", codec: { mimeType: \"video/VP8\", payloadType: 96 } }); pc.addTrack(source.track); const { report } = await new RTCStatsSampler(pc).sample(); if (!report.has(\"peer-connection\")) throw new Error(\"missing peer-connection stats\"); source.close(); pc.close(); console.log(\"companions ok\"); })().catch(error => { console.error(error); process.exitCode = 1; });"
              node --input-type=module -e "import { RTCPeerConnection } from \"@webrtc-node/webrtc\"; const pc = new RTCPeerConnection(); pc.close(); console.log(\"esm ok\");"
            '

  hosted:
    name: ${{ matrix.target }}
    needs: package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
            os: macos-15-intel
          - target: darwin-arm64
            os: macos-15
          - target: win32-x64
            os: windows-latest
          - target: win32-arm64
            os: windows-11-arm

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install published package
        shell: bash
        env:
          PACKAGE_SPEC: ${{ needs.package.outputs.spec }}
          MEDIA_SPEC: ${{ needs.package.outputs.media_spec }}
          STATS_SPEC: ${{ needs.package.outputs.stats_spec }}
          WEBRTC_NODE_PREBUILD_ONLY: "1"
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null
          for attempt in 1 2 3; do
            if npm install "$PACKAGE_SPEC" "$MEDIA_SPEC" "$STATS_SPEC"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          node -e "const { RTCPeerConnection } = require('@webrtc-node/webrtc'); const pc = new RTCPeerConnection(); pc.close(); console.log('cjs ok');"
          node -e "const { RTCPeerConnection } = require('@webrtc-node/webrtc'); const { EncodedMediaSource } = require('@webrtc-node/media'); const { RTCStatsSampler } = require('@webrtc-node/stats'); (async () => { const pc = new RTCPeerConnection(); const source = new EncodedMediaSource({ kind: 'video', codec: { mimeType: 'video/VP8', payloadType: 96 } }); pc.addTrack(source.track); const { report } = await new RTCStatsSampler(pc).sample(); if (!report.has('peer-connection')) throw new Error('missing peer-connection stats'); source.close(); pc.close(); console.log('companions ok'); })().catch(error => { console.error(error); process.exitCode = 1; });"
          node --input-type=module -e "import { RTCPeerConnection } from '@webrtc-node/webrtc'; const pc = new RTCPeerConnection(); pc.close(); console.log('esm ok');"
