name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm distribution tag
        required: true
        default: next
      publish_npm:
        description: Publish to npm after uploading prebuild assets
        required: true
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: read

jobs:
  conformance-gate:
    name: Require tag conformance
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    timeout-minutes: 105

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Wait for strict tag conformance
        if: github.event_name == 'release' || inputs.publish_npm
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if [ "$EVENT_NAME" != "release" ]; then
            tag="v$(node -p "require('./package.json').version")"
          fi

          git fetch --force --no-tags origin "refs/tags/$tag:refs/tags/$tag"
          target_sha="$(git rev-list -n 1 "$tag")"
          deadline=$((SECONDS + 6000))

          echo "Waiting for Conformance on $tag ($target_sha)."
          while (( SECONDS < deadline )); do
            run="$(
              gh api --method GET \
                "repos/$GITHUB_REPOSITORY/actions/workflows/conformance.yml/runs" \
                -f head_sha="$target_sha" \
                -f event=push \
                -f per_page=20 \
                --jq '((.workflow_runs | sort_by(.run_number) | last) // empty) | [.id, .status, (.conclusion // "pending"), .html_url] | map(tostring) | join("|")'
            )"

            if [ -z "$run" ]; then
              echo "No matching Conformance run yet; checking again in 30 seconds."
            else
              IFS='|' read -r run_id status conclusion url <<< "$run"
              echo "Conformance run $run_id is $status${conclusion:+ ($conclusion)}: $url"
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "Strict tag conformance passed." >> "$GITHUB_STEP_SUMMARY"
                  exit 0
                fi
                echo "Conformance completed with conclusion: $conclusion" >&2
                exit 1
              fi
            fi
            sleep 30
          done

          echo "Timed out waiting for tag conformance." >&2
          exit 1

  prebuild-linux:
    name: Prebuild ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-glibc
            dockerfile: build-containers/Dockerfile.debian
            image: webrtc-node-prebuild-debian
            build_args: --build-arg NODE_VERSION=20 --build-arg DEBIAN_VERSION=bullseye
            libc: glibc
          - target: linux-x64-musl
            dockerfile: build-containers/Dockerfile.alpine
            image: webrtc-node-prebuild-alpine
            build_args: --build-arg NODE_VERSION=20 --build-arg ALPINE_VERSION=3.20
            libc: musl

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Build Linux prebuild
        run: |
          docker build \
            -f "${{ matrix.dockerfile }}" \
            ${{ matrix.build_args }} \
            -t "${{ matrix.image }}" .
          docker run --rm \
            -v "$PWD:/usr/app" \
            -w /usr/app \
            "${{ matrix.image }}" \
            sh -lc "npm ci --ignore-scripts && npm run build -- --CDWEBRTC_NODE_STATIC_OPENSSL=ON && npm run prebuild:symbols:check && npm run tls:check && npm run prebuild:package -- --platform=linux --arch=x64 --libc=${{ matrix.libc }} && node -e \"const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();\""

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuild-artifacts/*

  prebuild-macos:
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: darwin-x64
            arch: x64
          - os: macos-15
            target: darwin-arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: ./.github/actions/setup-native-build

      - run: npm ci --ignore-scripts

      - run: npm run build -- --arch=${{ matrix.arch }} --CDWEBRTC_NODE_STATIC_OPENSSL=ON

      - run: npm run prebuild:package -- --platform=darwin --arch=${{ matrix.arch }}

      - run: node -e "const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();"

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuild-artifacts/*

  prebuild-windows:
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
            arch: x64
          - os: windows-11-arm
            target: win32-arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: ./.github/actions/setup-native-build

      - run: npm ci --ignore-scripts

      - run: npm run build -- --arch=${{ matrix.arch }} --CDWEBRTC_NODE_STATIC_OPENSSL=ON

      - run: npm run prebuild:package -- --platform=win32 --arch=${{ matrix.arch }}

      - run: node -e "const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();"

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuild-artifacts/*

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - conformance-gate
      - prebuild-linux
      - prebuild-macos
      - prebuild-windows
    timeout-minutes: 20
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          path: prebuild-artifacts
          merge-multiple: true

      - run: npm ci --ignore-scripts

      - run: npm run prebuild:check

      - run: npm run native:check

      - run: npm run pack:check

      - name: Verify release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          expected="v$(node -p "require('./package.json').version")"
          if [ "$EVENT_NAME" = "release" ] && [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected"
            exit 1
          fi

      - name: Upload prebuild release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if [ "$EVENT_NAME" != "release" ]; then
            tag="v$(node -p "require('./package.json').version")"
          fi
          gh release view "$tag" >/dev/null
          gh release upload "$tag" prebuild-artifacts/* --clobber

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          npm_tag="$INPUT_NPM_TAG"
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            npm_tag="latest"
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              npm_tag="next"
            fi
          fi
          npm publish --access public --tag "$npm_tag" --provenance
