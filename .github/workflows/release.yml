name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm distribution tag
        required: true
        default: next
      publish_npm:
        description: Publish to npm after uploading prebuild assets
        required: true
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  prebuild-linux-glibc:
    name: Prebuild linux-x64-glibc
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Build Debian glibc prebuild
        run: |
          docker build \
            -f build-containers/Dockerfile.debian \
            --build-arg NODE_VERSION=20 \
            --build-arg DEBIAN_VERSION=bullseye \
            -t webrtc-node-prebuild-debian .
          docker run --rm \
            -v "$PWD:/usr/app" \
            -w /usr/app \
            webrtc-node-prebuild-debian \
            sh -lc "npm ci --ignore-scripts && npm run build -- --CDWEBRTC_NODE_STATIC_OPENSSL=ON && npm run prebuild:package -- --platform=linux --arch=x64 --libc=glibc && node -e \"const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();\""

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-linux-x64-glibc
          path: prebuild-artifacts/*.tar.gz

  prebuild-linux-musl:
    name: Prebuild linux-x64-musl
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Build Alpine prebuild
        run: |
          docker build \
            -f build-containers/Dockerfile.alpine \
            --build-arg NODE_VERSION=20 \
            --build-arg ALPINE_VERSION=3.20 \
            -t webrtc-node-prebuild-alpine .
          docker run --rm \
            -v "$PWD:/usr/app" \
            -w /usr/app \
            webrtc-node-prebuild-alpine \
            sh -lc "npm ci --ignore-scripts && npm run build -- --CDWEBRTC_NODE_STATIC_OPENSSL=ON && npm run prebuild:package -- --platform=linux --arch=x64 --libc=musl && node -e \"const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();\""

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-linux-x64-musl
          path: prebuild-artifacts/*.tar.gz

  prebuild-macos:
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: darwin-x64
            arch: x64
          - os: macos-15
            target: darwin-arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install OpenSSL
        run: |
          brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - run: npm ci --ignore-scripts

      - run: npm run build -- --arch=${{ matrix.arch }} --CDWEBRTC_NODE_STATIC_OPENSSL=ON

      - run: npm run prebuild:package -- --platform=darwin --arch=${{ matrix.arch }}

      - run: node -e "const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();"

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuild-artifacts/*.tar.gz

  prebuild-windows:
    name: Prebuild win32-x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install OpenSSL
        shell: pwsh
        run: |
          $opensslVersion = "3.6.2"
          choco install openssl --version $opensslVersion --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey failed to install OpenSSL $opensslVersion"
          }
          $roots = @(
            "C:\Program Files\OpenSSL",
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL-Win32"
          )
          $opensslRoot = $roots | Where-Object {
            Test-Path (Join-Path $_ "include\openssl\ssl.h")
          } | Select-Object -First 1
          if (-not $opensslRoot) {
            throw "OpenSSL root was not found"
          }
          "OPENSSL_ROOT_DIR=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_INCLUDE_DIR=$opensslRoot\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_BIN_DIR=$opensslRoot\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          $opensslRoot | Out-File -FilePath $env:GITHUB_PATH -Append
          (Join-Path $opensslRoot "bin") | Out-File -FilePath $env:GITHUB_PATH -Append

      - run: npm ci --ignore-scripts

      - run: npm run build

      - name: Package prebuild
        shell: pwsh
        run: |
          $dlls = Get-ChildItem $env:OPENSSL_BIN_DIR -Filter "*.dll" | Where-Object {
            $_.Name -like "libcrypto-*.dll" -or $_.Name -like "libssl-*.dll"
          } | ForEach-Object { $_.FullName }
          if ($dlls.Count -lt 2) {
            throw "Expected OpenSSL libcrypto and libssl runtime DLLs in $env:OPENSSL_BIN_DIR"
          }
          $env:PREBUILD_EXTRA_FILES = ($dlls -join ";")
          npm run prebuild:package -- --platform=win32 --arch=x64

      - run: node -e "const { RTCPeerConnection } = require('./'); const pc = new RTCPeerConnection(); pc.close();"

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-win32-x64
          path: prebuild-artifacts/*.tar.gz

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs:
      - prebuild-linux-glibc
      - prebuild-linux-musl
      - prebuild-macos
      - prebuild-windows
    timeout-minutes: 20
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          path: prebuild-artifacts
          merge-multiple: true

      - run: npm ci --ignore-scripts

      - run: npm run prebuild:check

      - run: npm run native:check

      - run: npm run pack:check

      - name: Verify release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          expected="v$(node -p "require('./package.json').version")"
          if [ "$EVENT_NAME" = "release" ] && [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected"
            exit 1
          fi

      - name: Upload prebuild release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if [ "$EVENT_NAME" != "release" ]; then
            tag="v$(node -p "require('./package.json').version")"
          fi
          gh release view "$tag" >/dev/null
          gh release upload "$tag" prebuild-artifacts/*.tar.gz --clobber

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          npm_tag="$INPUT_NPM_TAG"
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            npm_tag="latest"
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              npm_tag="next"
            fi
          fi
          npm publish --access public --tag "$npm_tag" --provenance
